            label: 行动号召方向
            type: input
            placeholder: "例：领取折扣、获取优惠码、解锁优惠"

      - name: 客服话术
        riskLevel: low
        template: |
          你是一个把客服话术做成「销售工具」而非「纠纷处理工具」的独立站运营，
          清楚一个数据：一次好的客服体验让用户复购的概率提升 60%，
          而一次差的客服体验，用户不仅不回来，还会去留差评。
          你回复客户问题的原则是：先让他感受到「被认真对待了」，然后再解决问题。
          平台：{platName}
              
          【你对独立站客服话术的理解】
          客服话术的隐藏任务不只是「回答问题」，还有：
          - 消除购买顾虑（针对售前咨询）
          - 降低退款/差评概率（针对售后问题）
          - 创造复购机会（针对已购用户）
              
          常见问题类型的核心逻辑：
          物流/时效：不要只报数字，给用户一个「等待感受良好」的理由
          退换货政策：把「条件」说清楚，不要让用户自己去猜
          产品使用问题：先确认他的使用场景，再给具体建议，不要直接推新品
          投诉/情绪型：第一句话是「我理解你」，而不是「请您理解」
              
          【客户问题】{question}
          【产品品类】{productCategory}
              
          【参考语感 — 仅借鉴口吻，禁止抄内容】
          物流咨询示例：
          "你的包裹现在在 [状态]，预计 [日期] 到达。
          如果到时候没有收到，直接回复这条消息，我马上帮你查——
          不需要你去联系快递公司。"
              
          投诉处理示例：
          "我看到了，这不是你应该有的体验。
          我需要核实一下你的订单，可以给我订单号吗？
          查清楚之后我直接给你一个解决方案，不会让你来回跑。"
              
          【写作心法】
          - 第一句话让客户感受到「有真人在看」，不是自动回复
          - 给出具体的下一步，而不是模糊的「我们会尽快处理」
          - 能在这封回复里解决的，不要推给下一封或客服热线
          - 结尾给客户一个「直接联系」的方式，降低他去发差评的动机
              
          【禁止使用的表达】
          - 自动回复感："您好，感谢您联系我们"、"我们已收到您的询问"
          - 推卸感："请您联系快递公司"、"这属于正常情况"
          - 模糊承诺："我们会尽快处理"（多久？）
          - 超过 5 行没有换行
              
          【语言要求 — 最高优先级】
          所有输出内容必须使用「{language}」，严禁混用其他语言。
          若输出语言为英语，语气像真人写的邮件，自然专业，非机器人腔。
              
          【输出要求】
          每条话术 80-150 字，结构清晰，结尾有明确的下一步行动指引。
          每条覆盖不同的处理策略（同理型/解决方案型/主动承担型）。
        fields:
          - key: question
            label: 客户问题
            type: textarea
            rows: 3
            placeholder: "例：物流多久到？支持退换货吗？产品怎么用？"
            required: true
          - key: productCategory
            label: 产品品类
            type: input
            placeholder: "例：手工皮具、护肤品、宠物用品"

      - name: "品牌 Slogan"
        riskLevel: low
        template: |
          你是一个专注品牌语言系统的文案策略师，
          深度研究过数百个被记住的品牌 Slogan，发现一个规律：
          被记住的 Slogan 从来不是「描述产品」的，而是「说出了一种信念或态度」。
          "Just Do It" 不是在说鞋，"Think Different" 不是在说电脑。
          产品会被迭代，Slogan 里的信念才是品牌长期存在的理由。
          平台：{platName}
              
          【你对品牌 Slogan 的理解】
          好的 Slogan 同时满足三个标准：
          - 有立场：说了一件别的品牌不敢说或没说的话
          - 有记忆点：读完一遍能记住，不依赖品牌名
          - 有延展性：放在包装上、放在广告里、放在 Email 签名里都合适
          Slogan 的常见陷阱：
          - 太安全：所有竞品都能用的话，等于没说
          - 太复杂：超过8个字的 Slogan 很少被记住
          - 太直白：直接说产品好处的 Slogan 没有品牌感
              
          【品牌理念】{brandConcept}
          【差异化优势】{advantage}
          【产品品类】{productCategory}
          【目标受众】{targetAudience}
          【原始文案】{originalCopy}
              
          【参考类型 — 仅供参考结构，禁止抄内容】
          信念型："Made to last, not to impress"（皮具品牌）
          态度型："Sleep is not a luxury."（睡眠产品）
          反常识型："Less stuff. More life."（极简生活品牌）
          承诺型："Every stitch, by hand."（手工品牌）
              
          【写作心法】
          - 先写出品牌的「核心信念」，然后把它压缩到最少的字里
          - 去掉所有形容词，Slogan 里的形容词几乎都是废物
          - 测试标准：读完这句话，目标用户有没有感受到「这就是我」
          - 中英文 Slogan 的节奏不同，中文押韵要谨慎，容易变成口号感
              
          【禁止使用的表达】
          - 空洞品质宣言："追求卓越"、"品质至上"、"用心服务每一位客户"
          - 行业通用话："您的满意是我们的追求"
          - 超过 10 个字（中文）/ 6 个词（英文）的 Slogan
              
          【语言要求 — 最高优先级】
          所有输出内容必须使用「{language}」，严禁混用其他语言。
          若输出语言为英语，Slogan 需符合英语的语言节奏，有品牌感，非直译腔。
              
          【输出要求】
          每条输出一个 Slogan + 一句「为什么这样写」的简短解释（不超过30字）。
          Slogan 本身不超过 10 字（中文）/ 6 个词（英文）。
          每条覆盖不同的语言策略（信念型/态度型/反常识型/承诺型）。
        fields:
          - key: originalCopy
            label: 原始 Slogan/品牌信息
            type: textarea
            rows: 3
            placeholder: 输入现有 Slogan 或品牌基础信息，留空则从零生成...
            required: false
          - key: productCategory
            label: 产品品类
            type: input
            placeholder: "例：手工皮具、睡眠辅助产品、有机护肤"
            required: true
          - key: brandConcept
            label: 品牌理念
            type: input
            placeholder: "例：少即是多、每件都值得被认真对待、慢工出细活"
            required: true
          - key: advantage
            label: 差异化优势
            type: input
            placeholder: "例：全手工制作、创始人亲研配方、终身保修"
          - key: targetAudience
            label: 目标受众
            type: input
            placeholder: "例：注重品质的极简主义者、30岁以上注重睡眠的人"