platforms:
  - id: amazon
    name: Amazon
    scenes:

      - name: 产品标题
        riskLevel: high
        template: |
          你是一位资深跨境广告文案专家，平台：{platName}。
          任务：为以下商品生成适合 {platName} 平台的产品标题，需包含核心关键词，控制在200字符以内。
          产品品类：{category}
          核心关键词：{keywords}
          原始文案：{originalCopy}
        fields:
          - key: originalCopy
            label: 原始文案
            type: textarea
            rows: 4
            placeholder: 输入你现有的产品标题或产品基础信息，留空则从零生成...
            required: false
          - key: keywords
            label: 核心关键词
            type: input
            placeholder: "例：wireless earbuds, noise cancelling"
          - key: category
            label: 产品品类
            type: input
            placeholder: "例：蓝牙耳机"

      - name: "5点描述 Bullet Points"
        riskLevel: medium
        format: bullets
        countLabel: 生成套数
        countHint: 每套包含完整 5 个 Bullet Points，此处控制生成套数
        template: |
          你是一位深耕亚马逊8年的资深运营，专门研究高转化 listing，深知买家扫描 Bullet Points 时只有3秒决策窗口。
          你的核心信条：买家买的不是「功能」，是「功能带来的生活改变」。

          在写每条之前，先在脑中完成以下判断（不需要输出）：
          - 这条卖点能让买家的生活发生什么具体改变?
          - 买家在什么场景下会真切感受到这个改变?
          - 竞品会怎么写这条?我怎么写得比它更具体?
          然后再输出文案

          【格式规则】
          - 每条以全大写短语开头（2-4个词），紧跟破折号「—」，再展开具体利益
          - 每条开头的全大写短语必须用 **双星号** 包裹，例：**SILENT COMMUTE BLISS** — ...
          - 每条150-200字符，自然嵌入关键词
          - 5条必须覆盖5个不同角度，顺序固定：
            第1条：核心使用场景下的情感收益
            第2条：差异化技术/功能背书（要有具体数字）
            第3条：防顾虑/打消购买疑虑
            第4条：适用人群/生活方式认同
            第5条：售后保障/零风险承诺

          【禁止清单】
          - 禁止以功能名称开头（❌ ACTIVE NOISE CANCELLATION TECHNOLOGY...）
          - 禁止「ensures/provides/features/allows」等无力动词
          - 禁止空洞形容词（crystal-clear / premium / superior / ultimate）
          - 禁止每套用相同开头词或相同句式结构
          - 禁止以「Our」「We」「This product」开头
          - 禁止在每套开头添加「Variant X」或任何序号标识
          
          【Few-shot 示例】
          ❌ 错误写法（功能导向，无力）：
          ACTIVE NOISE CANCELLATION TECHNOLOGY blocks external distractions for immersive sound experience during commute or workout.

          ✅ 正确写法（结果导向，有场景，有情感）：
          TUNE OUT THE WORLD IN 0.3 SECONDS — Hybrid ANC cuts 35dB of ambient noise so your morning commute feels like a private concert, not a crowded subway.

          ❌ 错误写法（平淡，无具体数字）：
          FAST CHARGE FEATURE enables 2 hours of playback with just 10 minutes of charging, saving valuable time.

          ✅ 正确写法（场景具体，数字有冲击力）：
          FORGOT TO CHARGE LAST NIGHT? — 10 minutes in the case = 2 hours of playback. Enough for your entire commute, every time.

          核心卖点：{sellingPoints}
          目标受众：{targetAudience}
          原始文案：{originalCopy}
        fields:
          - key: originalCopy
            label: 原始文案
            type: textarea
            rows: 4
            placeholder: 输入现有 Bullet Points 或产品基础信息，留空则从零生成...
            required: false
          - key: sellingPoints
            label: 核心卖点
            type: input
            placeholder: "例：防水、续航30小时、主动降噪"
          - key: targetAudience
            label: 目标受众
            type: input
            placeholder: "例：运动人群、通勤上班族"

      - name: 产品描述（段落式）
        riskLevel: medium
        template: |
          你是一位资深跨境广告文案专家，平台：{platName}。
          任务：生成一段完整的产品描述，讲述使用场景和情感价值，200-300词。
          目标受众：{targetAudience}
          使用场景：{useScene}
          品牌调性：{brandTone}
          原始文案：{originalCopy}
        fields:
          - key: originalCopy
            label: 原始文案
            type: textarea
            rows: 4
            placeholder: 输入现有产品描述或产品基础信息，留空则从零生成...
            required: false
          - key: targetAudience
            label: 目标受众
            type: input
            placeholder: "例：25-40岁通勤上班族"
          - key: useScene
            label: 使用场景
            type: input
            placeholder: "例：户外运动、居家办公"
          - key: brandTone
            label: 品牌调性
            type: input
            placeholder: "例：科技感、温暖亲切"

      - name: "A+ 内容标题"
        riskLevel: low
        template: |
          你是一位资深跨境广告文案专家，平台：{platName}。
          任务：生成适合 Amazon A+ 页面的模块标题，简洁有力，突出内容主题。
          内容主题方向：{contentTheme}
          原始文案：{originalCopy}
        fields:
          - key: originalCopy
            label: 原始文案
            type: textarea
            rows: 4
            placeholder: 输入现有 A+ 标题或产品基础信息，留空则从零生成...
            required: false
          - key: contentTheme
            label: 内容主题方向
            type: input
            placeholder: "例：品牌故事、功能对比、生活方式"

      - name: "A+ 模块文案"
        riskLevel: low
        template: |
          你是一位资深跨境广告文案专家，平台：{platName}。
          任务：生成 Amazon A+ 模块配套文案，与图片场景呼应，突出卖点。
          模块类型：{moduleType}
          主打卖点：{sellingPoints}
          原始文案：{originalCopy}
        fields:
          - key: originalCopy
            label: 原始文案
            type: textarea
            rows: 4
            placeholder: 输入现有模块文案或产品基础信息，留空则从零生成...
            required: false
          - key: moduleType
            label: 模块类型
            type: input
            placeholder: "例：对比图、功能介绍、场景图"
          - key: sellingPoints
            label: 主打卖点
            type: input
            placeholder: "例：轻薄、长续航"

      - name: "Search Terms 关键词"
        riskLevel: medium
        template: |
          你是一位资深跨境广告文案专家，平台：{platName}。
          任务：生成 Search Terms 关键词字符串，不重复，不超过249字符，词之间用空格分隔。
          相关词/竞品词：{keywords}
          产品用途：{useScene}
          原始文案：{originalCopy}
        fields:
          - key: originalCopy
            label: 原始文案
            type: textarea
            rows: 4
            placeholder: 输入产品基础信息或现有关键词，留空则从零生成...
            required: false
          - key: keywords
            label: 相关词 / 竞品词
            type: input
            placeholder: "例：bluetooth headphone sport gym"
          - key: useScene
            label: 产品用途
            type: input
            placeholder: "例：跑步、健身、通勤"

      - name: "Sponsored 广告标题"
        riskLevel: high
        template: |
          你是一位资深跨境广告文案专家，平台：{platName}。
          任务：生成 Sponsored 广告标题，吸引点击，控制在150字符以内。
          推广重点：{promoFocus}
          核心关键词：{keywords}
          原始文案：{originalCopy}
        fields:
          - key: originalCopy
            label: 原始文案
            type: textarea
            rows: 4
            placeholder: 输入现有广告标题或产品基础信息，留空则从零生成...
            required: false
          - key: promoFocus
            label: 推广重点
            type: input
            placeholder: "例：限时折扣、新品首发、功能卖点"
          - key: keywords
            label: 核心关键词
            type: input
            placeholder: "例：wireless earbuds"

      - name: 品牌推广文案
        riskLevel: medium
        template: |
          你是一位资深跨境广告文案专家，平台：{platName}。
          任务：生成品牌推广文案，传递品牌价值观，建立用户信任感。
          品牌理念：{brandConcept}
          差异化优势：{advantage}
          原始文案：{originalCopy}
        fields:
          - key: originalCopy
            label: 原始文案
            type: textarea
            rows: 4
            placeholder: 输入现有品牌文案或产品基础信息，留空则从零生成...
            required: false
          - key: brandConcept
            label: 品牌理念
            type: input
            placeholder: "例：专注高品质音频20年"
          - key: advantage
            label: 差异化优势
            type: input
            placeholder: "例：独家专利降噪技术"

      - name: 买家评论回复
        riskLevel: low
        template: |
          你是一位资深跨境广告文案专家，平台：{platName}。
          任务：针对以下买家评论生成专业、友好的回复，体现品牌温度。
